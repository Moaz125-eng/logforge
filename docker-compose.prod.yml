services:
  logforge:
    image: logforge:latest
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      LOGFORGE_HTTP_ADDR: ":8080"
      LOGFORGE_TCP_ADDR: ":9090"
      LOGFORGE_DATA_DIR: "/data"
      LOGFORGE_WORKERS: "16"
      LOGFORGE_BATCH_SIZE: "512"
      LOGFORGE_RETENTION_DAYS: "30"
      LOGFORGE_NODE_ID: "prod-primary"
    volumes:
      - logforge-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  logforge-agent:
    image: logforge:latest
    command: ["logforge-agent"]
    restart: unless-stopped
    environment:
      LOGFORGE_FORWARD_PEERS: "http://logforge:8080"
      LOGFORGE_NODE_ID: "prod-agent"
    depends_on:
      - logforge

volumes:
  logforge-data:
