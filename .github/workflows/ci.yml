name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go mod download
      - run: go test ./...
      - run: go build -o bin/logforge-server ./cmd/server
      - run: go build -o bin/logforge-agent ./cmd/agent
      - run: go build -o bin/logforge-bench ./cmd/bench
